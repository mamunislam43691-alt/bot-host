# nixpacks.toml — Railway build configuration

[phases.setup]
nixPkgs = [
  # --- Runtimes ---
  'python312',
  'python312Packages.pip',
  'nodejs_22',

  # --- C/C++ stdlib — grpc, numpy, opencv, cryptography এর জন্য অবশ্যই দরকার ---
  'gcc',
  'stdenv.cc.cc.lib',
  'gnumake',
  'pkg-config',

  # --- SSL / crypto ---
  'openssl',
  'libffi',

  # --- Compression ---
  'zlib',

  # --- Image libs (Pillow, opencv) ---
  'libjpeg',
  'libpng',
  'freetype',

  # --- XML (lxml) ---
  'libxml2',
  'libxslt',

  # --- Media (yt-dlp, pydub, moviepy) ---
  'ffmpeg',

  # --- Utilities ---
  'bash',
  'curl',
  'wget',
  'git',
]

[phases.install]
cmds = ['npm install']

[start]
cmd = 'node server.js'
