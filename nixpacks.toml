# nixpacks.toml — Railway build configuration

[phases.setup]
nixPkgs = [
  # --- Runtimes ---
  'python312',
  'python312Packages.pip',
  'nodejs_22',

  # --- C++ stdlib — grpc/firebase/numpy/cryptography এর জন্য অবশ্যই দরকার ---
  'gcc',
  'stdenv.cc.cc.lib',
  'glibc',

  # --- Build tools ---
  'gnumake',
  'pkg-config',
  'binutils',
  'patchelf',

  # --- SSL / crypto ---
  'openssl',
  'libffi',

  # --- Compression / Image / XML ---
  'zlib',
  'libjpeg',
  'libpng',
  'freetype',
  'libxml2',
  'libxslt',

  # --- Media ---
  'ffmpeg',

  # --- Utilities ---
  'bash',
  'curl',
  'wget',
  'git',
  'findutils',
]

[phases.install]
cmds = ['npm install']

[start]
cmd = 'node server.js'
