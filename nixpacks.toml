# nixpacks.toml — Railway build configuration

[phases.setup]
nixPkgs = [
  'python312',
  'python312Packages.pip',
  'nodejs_22',
  'gcc',
  'stdenv.cc.cc.lib',
  'glibc',
  'gnumake',
  'pkg-config',
  'openssl',
  'libffi',
  'zlib',
  'libjpeg',
  'libpng',
  'freetype',
  'libxml2',
  'libxslt',
  'ffmpeg',
  'bash',
  'curl',
  'wget',
  'git',
]

[phases.install]
cmds = [
  'npm install',
  # pip3.12 বা pip3 দিয়ে pre-install (python3.12 -m pip Nix-এ কাজ করে না)
  'pip3.12 install --prefer-binary --quiet grpcio firebase-admin google-cloud-firestore numpy pandas Pillow opencv-python-headless cryptography lxml aiohttp pydantic || pip3 install --prefer-binary --quiet grpcio firebase-admin google-cloud-firestore numpy pandas Pillow opencv-python-headless cryptography lxml aiohttp pydantic || true',
]

[start]
cmd = 'node server.js'
