# nixpacks.toml — Railway build configuration

[phases.setup]
nixPkgs = [
  'python312',
  'python312Packages.pip',
  'nodejs_22',
  'gcc',
  'stdenv.cc.cc.lib',
  'glibc',
  'gnumake',
  'pkg-config',
  'openssl',
  'libffi',
  'zlib',
  'libjpeg',
  'libpng',
  'freetype',
  'libxml2',
  'libxslt',
  'ffmpeg',
  'bash',
  'curl',
  'wget',
  'git',
]

[phases.install]
cmds = [
  'npm install',
  # Nix-এ python3.12 -m pip ব্যবহার করতে হয় (python3 -m pip কাজ করে না)
  'python3.12 -m pip install --prefer-binary --quiet grpcio firebase-admin google-cloud-firestore numpy pandas Pillow opencv-python-headless cryptography lxml aiohttp pydantic',
]

[start]
cmd = 'node server.js'
