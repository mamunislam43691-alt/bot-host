# nixpacks.toml — Railway build configuration

[phases.setup]
nixPkgs = [
  # --- Runtimes ---
  'python312',
  'python312Packages.pip',
  'nodejs_22',

  # --- Build tools ---
  'gcc',
  'gnumake',
  'pkg-config',

  # --- Common system libs (cryptography, Pillow, lxml, psycopg2 etc.) ---
  'openssl',
  'libffi',
  'zlib',
  'libjpeg',
  'libpng',
  'freetype',
  'libxml2',
  'libxslt',

  # --- Media (yt-dlp, pydub, moviepy) ---
  'ffmpeg',

  # --- Utilities ---
  'bash',
  'curl',
  'wget',
  'git',
]

[phases.install]
cmds = ['npm install']

[start]
cmd = 'node server.js'
